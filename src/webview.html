<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            padding: 12px;
            font-family: var(--vscode-font-family);
            font-size: 13px;
            color: var(--vscode-foreground);
            background: var(--vscode-editor-background);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            margin: 0;
        }

        .selection-info {
            background: var(--vscode-editor-selectionBackground);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .selection-info code {
            display: block;
            white-space: pre-wrap;
            font-size: 11px;
            margin-top: 8px;
            padding: 8px;
            background: var(--vscode-editor-inactiveSelectionBackground);
            border-radius: 3px;
            max-height: 150px;
            overflow: auto;
        }

        .history-section {
            margin-top: 12px;
            border-top: 1px solid var(--vscode-panel-border);
            padding-top: 8px;
            flex-shrink: 0;
        }

        .history-header {
            font-weight: bold;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
        }

        .history-header:hover {
            opacity: 0.8;
        }

        .history-messages {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 12px;
            font-size: 11px;
        }

        .history-message {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 6px;
            margin-bottom: 4px;
            border-radius: 4px;
        }

        .history-message.user {
            background: var(--vscode-editor-selectionBackground);
        }

        .history-message.assistant {
            background: var(--vscode-editor-inactiveSelectionBackground);
        }

        .history-content {
            flex: 1;
            word-break: break-word;
        }

        .delete-history-btn {
            background: none;
            border: none;
            color: var(--vscode-descriptionForeground);
            cursor: pointer;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-message:hover .delete-history-btn {
            opacity: 1;
        }

        .delete-history-btn:hover {
            background: var(--vscode-toolbar-hoverBackground);
            color: var(--vscode-errorForeground);
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .toolbar button {
            padding: 4px 8px;
            font-size: 11px;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .toolbar button:hover {
            background: var(--vscode-button-hoverBackground);
        }

        .search-area {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .search-area input {
            flex: 1;
            padding: 6px 8px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
        }

        textarea {
            width: 100%;
            padding: 8px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        button {
            margin-top: 8px;
            padding: 6px 12px;
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: var(--vscode-button-hoverBackground);
        }

        .response-content {
            background: var(--vscode-editor-inactiveSelectionBackground);
            padding: 10px;
            border-radius: 4px;
            margin-top: 8px;
            max-height: 250px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.5;
            flex-shrink: 0;
        }

        .response-content pre {
            background: var(--vscode-editor-background);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .response-content code {
            background: var(--vscode-editor-background);
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }

        .response-content h1,
        .response-content h2,
        .response-content h3 {
            margin-top: 12px;
            margin-bottom: 8px;
        }

        .response-content ul,
        .response-content ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .response-content li {
            margin: 4px 0;
        }

        .response-content blockquote {
            border-left: 3px solid var(--vscode-textLink-foreground);
            margin: 8px 0;
            padding-left: 12px;
            color: var(--vscode-descriptionForeground);
        }

        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--vscode-descriptionForeground);
            padding: 8px;
            flex-shrink: 0;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--vscode-foreground);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: var(--vscode-errorForeground);
            margin-top: 8px;
            padding: 8px;
            background: var(--vscode-inputValidation-errorBackground);
            border-radius: 4px;
            flex-shrink: 0;
        }

        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 14px;
            background: var(--vscode-foreground);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .code-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .status-bar {
            margin-top: 8px;
            padding: 4px;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            border-top: 1px solid var(--vscode-panel-border);
            flex-shrink: 0;
        }

        .system-message {
            background: var(--vscode-editor-inactiveSelectionBackground);
            padding: 6px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            flex-shrink: 0;
        }

        #responseArea {
            flex-shrink: 0;
        }

        #searchResults {
            max-height: 100px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        #systemMessages {
            max-height: 80px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .spacer {
            flex: 1;
        }

        kbd {
            background: var(--vscode-editor-background);
            border: 1px solid var(--vscode-panel-border);
            border-radius: 3px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 10px;
        }

        details {
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        summary {
            cursor: pointer;
            color: var(--vscode-textLink-foreground);
            font-size: 11px;
        }
    </style>
</head>

<body>
    <!-- Response at the top -->
    <div id="responseArea" style="display: none;">
        <div class="response-header">🤖 Response <span id="streamingIndicator" class="streaming-cursor"></span></div>
        <div class="response-content" id="responseContent"></div>
        <div class="code-actions" id="codeActions">
            <button id="applyBtn">Apply</button>
            <button id="copyBtn">Copy</button>
        </div>
    </div>

    <!-- Selection info -->
    <div id="selectionInfo" class="selection-info" style="display: none;">
        <strong>📌 Selected</strong>
        <div id="fileInfo"></div>
        <code id="selectedCode"></code>
    </div>

    <!-- Thinking indicator -->
    <div id="thinking" class="thinking" style="display: none;">
        <div class="loading-spinner"></div>
        <span>AI is thinking...</span>
    </div>

    <!-- Spacer - pushes everything below to bottom -->
    <div class="spacer"></div>

    <!-- Search -->
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="🔍 Search workspace...">
        <button id="searchBtn">Search</button>
    </div>
    <div id="searchResults" style="display: none;"></div>

    <!-- System messages -->
    <div id="systemMessages"></div>

    <!-- Textarea -->
    <textarea id="promptInput" rows="3" placeholder="Ask AI... Type /help for commands"></textarea>

    <!-- Send button -->
    <button id="sendBtn">Send</button>
    <div style="font-size: 10px; margin-top: 4px;">💡 /help, /voice, /image, @file.ts, Ctrl+Enter to send</div>

    <!-- Toolbar -->
    <div class="toolbar">
        <button id="voiceBtn">🎤 Voice</button>
        <button id="imageBtn">🖼️ Image</button>
        <button id="settingsBtn">⚙️ Settings</button>
        <button id="exportBtn">💾 Export</button>
        <button id="importBtn">📂 Import</button>
        <button id="clearAllBtn">🗑️ Clear All</button>
    </div>

    <!-- Keyboard shortcuts -->
    <details>
        <summary>⌨️ Keyboard Shortcuts</summary>
        <div style="padding: 8px; font-size: 11px;">
            <div><kbd>Ctrl+Shift+F</kbd> - Fix code</div>
            <div><kbd>Ctrl+Shift+G</kbd> - Generate code</div>
            <div><kbd>Ctrl+Shift+E</kbd> - Explain code</div>
            <div><kbd>Ctrl+Shift+T</kbd> - Generate test</div>
            <div><kbd>Ctrl+Enter</kbd> - Send prompt</div>
            <div><kbd>/help</kbd> - All slash commands</div>
        </div>
    </details>

    <!-- Error message -->
    <div id="errorMsg" class="error" style="display: none;"></div>

    <!-- Status bar -->
    <div id="statusBar" class="status-bar">Ready</div>

    <!-- History at the bottom -->
    <div class="history-section">
        <div class="history-header" id="historyHeader">📜 History ▼</div>
        <div id="historyMessages" class="history-messages"></div>
    </div>

        <script>
        (function() {
            const vscode = acquireVsCodeApi();
            let currentResponse = '';
            let recognition = null;
            let historyVisible = false; // Start collapsed (arrow right)

            function escapeHtml(text) {
                if (!text) return '';
                return text.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function renderMarkdown(text) {
                if (!text) return '';
                let html = escapeHtml(text);
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/_(.*?)_/g, '<em>$1</em>');
                html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                    return '<pre><code class="language-' + lang + '">' + code.trim() + '</code></pre>';
                });
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
                html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
                html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
                html = html.replace(/^[-*] (.*?)$/gm, '<li>$1</li>');
                html = html.replace(/(<li>.*?<\/li>\n?)+/gs, '<ul>$&</ul>');
                html = html.replace(/\n/g, '<br>');
                html = html.replace(/^&gt; (.*?)$/gm, '<blockquote>$1</blockquote>');
                return html;
            }

            function updateStatus(text) {
                const statusEl = document.getElementById('statusBar');
                if (statusEl) statusEl.textContent = text;
            }

            function toggleHistory() {
                const msgs = document.getElementById('historyMessages');
                const header = document.getElementById('historyHeader');
                if (historyVisible) {
                    msgs.style.display = 'none';
                    header.innerHTML = '📜 History ▶';
                } else {
                    msgs.style.display = 'block';
                    header.innerHTML = '📜 History ▼';
                }
                historyVisible = !historyVisible;
            }

            function loadInitialHistory() {
                vscode.postMessage({ command: 'getInitialHistory' });
            }

            // Initialize all event listeners
            function initEventListeners() {
                const historyHeader = document.getElementById('historyHeader');
                if (historyHeader) historyHeader.onclick = toggleHistory;

                const voiceBtn = document.getElementById('voiceBtn');
                if (voiceBtn) {
                    voiceBtn.onclick = function() {
                        if (recognition) recognition.start();
                        else updateStatus('Voice not supported');
                    };
                }

                const imageBtn = document.getElementById('imageBtn');
                if (imageBtn) {
                    imageBtn.onclick = function() {
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.accept = 'image/*';
                        input.onchange = function(e) {
                            const file = e.target.files[0];
                            const reader = new FileReader();
                            reader.onload = function(ev) {
                                const prompt = document.getElementById('promptInput').value || 'Analyze this image';
                                vscode.postMessage({ command: 'sendImageInput', imageData: ev.target.result, prompt: prompt });
                            };
                            reader.readAsDataURL(file);
                        };
                        input.click();
                    };
                }

                const settingsBtn = document.getElementById('settingsBtn');
                if (settingsBtn) settingsBtn.onclick = function() {
                    vscode.postMessage({ command: 'sendPrompt', prompt: '/settings' });
                };

                const exportBtn = document.getElementById('exportBtn');
                if (exportBtn) exportBtn.onclick = function() {
                    vscode.postMessage({ command: 'exportHistory' });
                };

                const importBtn = document.getElementById('importBtn');
                if (importBtn) importBtn.onclick = function() {
                    vscode.postMessage({ command: 'importHistory' });
                };

                const clearAllBtn = document.getElementById('clearAllBtn');
                if (clearAllBtn) clearAllBtn.onclick = function() {
                    vscode.postMessage({ command: 'clearHistory' });
                };

                const sendBtn = document.getElementById('sendBtn');
                if (sendBtn) {
                    sendBtn.onclick = function() {
                        const prompt = document.getElementById('promptInput').value.trim();
                        if (prompt) {
                            vscode.postMessage({ command: 'sendPrompt', prompt: prompt });
                            document.getElementById('promptInput').value = '';
                        } else {
                            updateStatus('Please enter a prompt');
                        }
                    };
                }

                const promptInput = document.getElementById('promptInput');
                if (promptInput) {
                    promptInput.addEventListener('keydown', function(e) {
                        if (e.ctrlKey && e.key === 'Enter') {
                            const btn = document.getElementById('sendBtn');
                            if (btn) btn.click();
                        }
                    });
                }

                const searchBtn = document.getElementById('searchBtn');
                if (searchBtn) {
                    searchBtn.onclick = function() {
                        const query = document.getElementById('searchInput').value.trim();
                        if (query) {
                            vscode.postMessage({ command: 'searchWorkspace', query: query });
                        }
                    };
                }

                const applyBtn = document.getElementById('applyBtn');
                if (applyBtn) {
                    applyBtn.onclick = function() {
                        if (currentResponse) {
                            vscode.postMessage({ command: 'applyCode', code: currentResponse });
                        } else {
                            updateStatus('Nothing to apply');
                        }
                    };
                }

                const copyBtn = document.getElementById('copyBtn');
                if (copyBtn) {
                    copyBtn.onclick = function() {
                        if (currentResponse) {
                            vscode.postMessage({ command: 'copyCode', code: currentResponse });
                        } else {
                            updateStatus('Nothing to copy');
                        }
                    };
                }
            }

            // Voice recognition setup
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.onresult = function(e) {
                    const text = e.results[0][0].transcript;
                    document.getElementById('promptInput').value = text;
                    vscode.postMessage({ command: 'sendVoiceInput', text: text });
                };
                recognition.onerror = function() {
                    updateStatus('Voice recognition error');
                };
            }

            // Message handler
            window.addEventListener('message', function(event) {
                const msg = event.data;
                
                switch (msg.command) {
                    case 'selectionLoaded':
                        document.getElementById('selectionInfo').style.display = 'block';
                        document.getElementById('fileInfo').innerHTML = '📄 ' + msg.fileName + ' L' + msg.lineStart + '-' + msg.lineEnd;
                        document.getElementById('selectedCode').textContent = msg.code;
                        break;
                    case 'updateHistory':
                        const historyDiv = document.getElementById('historyMessages');
                        if (msg.history && msg.history.length) {
                            let html = '';
                            for (let i = 0; i < msg.history.length; i++) {
                                const h = msg.history[i];
                                html += '<div class="history-message ' + h.role + '" data-index="' + i + '">' +
                                    '<div class="history-content">' +
                                    '<strong>' + (h.role === 'user' ? 'You' : 'AI') + ':</strong> ' +
                                    '<span>' + escapeHtml(h.content) + '</span>' +
                                    '</div>' +
                                    '<button class="delete-history-btn" data-index="' + i + '" title="Delete this message">🗑️</button>' +
                                    '</div>';
                            }
                            historyDiv.innerHTML = html;
                            
                            document.querySelectorAll('.delete-history-btn').forEach(function(btn) {
                                btn.onclick = function(e) {
                                    e.stopPropagation();
                                    const idx = parseInt(btn.getAttribute('data-index'));
                                    vscode.postMessage({ command: 'deleteHistoryEntry', index: idx });
                                };
                            });
                        } else {
                            historyDiv.innerHTML = '<div class="system-message">No history yet</div>';
                        }
                        // Keep collapsed state
                        if (!historyVisible) {
                            historyDiv.style.display = 'none';
                        }
                        break;
                    case 'appendSystemMessage':
                        const sysDiv = document.createElement('div');
                        sysDiv.className = 'system-message';
                        sysDiv.textContent = msg.message;
                        document.getElementById('systemMessages').appendChild(sysDiv);
                        setTimeout(function() { sysDiv.remove(); }, 3000);
                        break;
                    case 'searchResults':
                        const resultsDiv = document.getElementById('searchResults');
                        if (msg.results && msg.results.length) {
                            let html = '<strong>🔍 ' + msg.count + ' matches</strong><ul>';
                            for (let i = 0; i < msg.results.length; i++) {
                                const r = msg.results[i];
                                html += '<li onclick="window.vscodeApiOpenFile(\'' + r.path + ':' + r.line + '\')">' +
                                    '📄 ' + r.name + ' L' + r.line +
                                    '<div style="font-size:10px;">' + escapeHtml(r.preview) + '</div>' +
                                    '</li>';
                            }
                            html += '</ul>';
                            resultsDiv.innerHTML = html;
                        } else {
                            resultsDiv.innerHTML = '<div class="system-message">No results found</div>';
                        }
                        resultsDiv.style.display = 'block';
                        break;
                    case 'clearHistory':
                        document.getElementById('historyMessages').innerHTML = '<div class="system-message">History cleared</div>';
                        break;
                    case 'thinking':
                        document.getElementById('thinking').style.display = msg.thinking ? 'flex' : 'none';
                        updateStatus(msg.thinking ? 'AI is thinking...' : 'Ready');
                        break;
                    case 'clearResponse':
                        currentResponse = '';
                        document.getElementById('responseContent').innerHTML = '';
                        document.getElementById('codeActions').style.display = 'block';
                        document.getElementById('streamingIndicator').style.display = 'inline-block';
                        document.getElementById('responseArea').style.display = 'block';
                        break;
                    case 'streamChunk':
                        currentResponse = msg.full;
                        document.getElementById('responseContent').innerHTML = renderMarkdown(msg.full);
                        document.getElementById('responseContent').scrollTop = document.getElementById('responseContent').scrollHeight;
                        break;
                    case 'streamComplete':
                        document.getElementById('streamingIndicator').style.display = 'none';
                        document.getElementById('codeActions').style.display = 'block';
                        updateStatus('Ready');
                        break;
                    case 'response':
                        currentResponse = msg.response;
                        document.getElementById('responseContent').innerHTML = renderMarkdown(msg.response);
                        document.getElementById('responseArea').style.display = 'block';
                        document.getElementById('codeActions').style.display = 'block';
                        updateStatus('Ready');
                        break;
                    case 'error':
                        updateStatus('Error');
                        const errDiv = document.getElementById('errorMsg');
                        errDiv.innerHTML = '❌ ' + escapeHtml(msg.error);
                        errDiv.style.display = 'block';
                        setTimeout(function() { errDiv.style.display = 'none'; }, 5000);
                        break;
                }
            });

            window.vscodeApiOpenFile = function(path) {
                vscode.postMessage({ command: 'openFile', path: path });
            };

            // Initialize everything
            initEventListeners();
            loadInitialHistory();
            
            // Set initial collapsed state (arrow right, content hidden)
            const historyHeaderEl = document.getElementById('historyHeader');
            const historyMsgsEl = document.getElementById('historyMessages');
            if (historyHeaderEl && !historyVisible) {
                historyHeaderEl.innerHTML = '📜 History ▶';
            }
            if (historyMsgsEl) {
                historyMsgsEl.style.display = 'none';
            }
            
            updateStatus('Ready. Select code or type a question.');
        })();
    </script>
</body>

</html>
