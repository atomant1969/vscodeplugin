<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            padding: 12px;
            font-family: var(--vscode-font-family);
            font-size: 13px;
            color: var(--vscode-foreground);
            background: var(--vscode-editor-background);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            margin: 0;
        }

        .selection-info {
            background: var(--vscode-editor-selectionBackground);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .selection-info code {
            display: block;
            white-space: pre-wrap;
            font-size: 11px;
            margin-top: 8px;
            padding: 8px;
            background: var(--vscode-editor-inactiveSelectionBackground);
            border-radius: 3px;
            max-height: 150px;
            overflow: auto;
        }

        .history-section {
            margin-top: 12px;
            border-top: 1px solid var(--vscode-panel-border);
            padding-top: 8px;
            flex-shrink: 0;
        }

        .history-header {
            font-weight: bold;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
        }

        .history-header:hover {
            opacity: 0.8;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .right-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .right-controls button {
            margin: 0;
            padding: 2px 6px;
            font-size: 11px;
            background: none;
            color: var(--vscode-descriptionForeground);
            border: none;
            cursor: pointer;
        }

        .right-controls button:hover {
            color: var(--vscode-foreground);
            background: var(--vscode-toolbar-hoverBackground);
        }

        .right-controls details {
            display: inline-block;
            margin: 0;
        }

        .right-controls summary {
            cursor: pointer;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            list-style: none;
            display: inline-block;
        }

        .right-controls summary:hover {
            color: var(--vscode-foreground);
        }

        .right-controls details[open] summary {
            color: var(--vscode-foreground);
        }

        .history-messages {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 12px;
            font-size: 11px;
        }

        .history-message {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 6px;
            margin-bottom: 4px;
            border-radius: 4px;
        }

        .history-message.user {
            background: var(--vscode-editor-selectionBackground);
        }

        .history-message.assistant {
            background: var(--vscode-editor-inactiveSelectionBackground);
        }

        .history-content {
            flex: 1;
            word-break: break-word;
        }

        .delete-history-btn {
            background: none;
            border: none;
            color: var(--vscode-descriptionForeground);
            cursor: pointer;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-message:hover .delete-history-btn {
            opacity: 1;
        }

        .delete-history-btn:hover {
            background: var(--vscode-toolbar-hoverBackground);
            color: var(--vscode-errorForeground);
        }

        .search-area {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .search-area input {
            flex: 1;
            padding: 6px 8px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
        }

        textarea {
            width: 100%;
            padding: 8px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .response-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-top: 12px;
        }

        #responseArea {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .response-content {
            background: var(--vscode-editor-inactiveSelectionBackground);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.5;
            flex: 1;
            overflow-y: auto;
            margin: 8px 0;
        }

        .response-content pre {
            background: var(--vscode-editor-background);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .response-content code {
            background: var(--vscode-editor-background);
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }

        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--vscode-descriptionForeground);
            padding: 8px;
            background: var(--vscode-editor-inactiveSelectionBackground);
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--vscode-foreground);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .action-icons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 3px;
            color: var(--vscode-descriptionForeground);
        }

        .icon-btn:hover {
            background: var(--vscode-toolbar-hoverBackground);
            color: var(--vscode-foreground);
        }

        .error {
            color: var(--vscode-errorForeground);
            margin-top: 8px;
            padding: 8px;
            background: var(--vscode-inputValidation-errorBackground);
            border-radius: 4px;
            flex-shrink: 0;
        }

        .status-bar {
            margin-top: 8px;
            padding: 4px;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            border-top: 1px solid var(--vscode-panel-border);
            flex-shrink: 0;
        }

        .system-message {
            background: var(--vscode-editor-inactiveSelectionBackground);
            padding: 6px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            flex-shrink: 0;
        }

        #searchResults {
            max-height: 100px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        #systemMessages {
            max-height: 80px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        kbd {
            background: var(--vscode-editor-background);
            border: 1px solid var(--vscode-panel-border);
            border-radius: 3px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 10px;
        }
    </style>
</head>

<body>
    <!-- Response area -->
    <div class="response-container">
        <div id="responseArea" style="display: none;">
            <div class="response-content" id="responseContent"></div>
            <div class="action-icons">
                <button class="icon-btn" id="applyBtn" title="Apply to editor">📋 Apply</button>
                <button class="icon-btn" id="copyBtn" title="Copy to clipboard">📄 Copy</button>
            </div>
        </div>
    </div>

    <!-- Selection info -->
    <div id="selectionInfo" class="selection-info" style="display: none;">
        <strong>📌 Selected</strong>
        <div id="fileInfo"></div>
        <code id="selectedCode"></code>
    </div>

    <div class="spacer"></div>

    <!-- Thinking indicator - above search -->
    <div id="thinking" class="thinking" style="display: none;">
        <div class="loading-spinner"></div>
        <span>AI is thinking...</span>
    </div>

    <!-- Search -->
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="🔍 Search workspace...">
        <button id="searchBtn">Search</button>
    </div>
    <div id="searchResults" style="display: none;"></div>

    <!-- System messages -->
    <div id="systemMessages"></div>

    <textarea id="promptInput" rows="3" placeholder="Ask AI... Type /help for commands. Press Enter to send, Shift+Enter for new line. Try /voice, /image, @file.ts"></textarea>

    <div class="header-row">
        <div class="history-header" id="historyHeader">📜 History ▶</div>
        <div class="right-controls">
            <button id="voiceBtn" title="Voice input">🎤 Voice</button>
            <button id="imageBtn" title="Upload image">🖼️ Image</button>
            <button id="settingsBtn" title="Settings">⚙️ Settings</button>
            <button id="exportBtn" title="Export history">💾 Export</button>
            <button id="importBtn" title="Import history">📂 Import</button>
            <button id="clearAllBtn" title="Clear all history">🗑️ Clear</button>
            <details>
                <summary>⌨️</summary>
                <div style="position: absolute; right: 20px; background: var(--vscode-editor-background); border: 1px solid var(--vscode-panel-border); border-radius: 4px; padding: 8px; margin-top: 4px; z-index: 100;">
                    <div><kbd>Ctrl+Shift+F</kbd> - Fix code</div>
                    <div><kbd>Ctrl+Shift+G</kbd> - Generate code</div>
                    <div><kbd>Ctrl+Shift+E</kbd> - Explain code</div>
                    <div><kbd>Ctrl+Shift+T</kbd> - Generate test</div>
                    <div><kbd>Enter</kbd> - Send prompt</div>
                    <div><kbd>Shift+Enter</kbd> - New line</div>
                    <div><kbd>/help</kbd> - All slash commands</div>
                </div>
            </details>
        </div>
    </div>

    <div id="historyMessages" class="history-messages" style="display: none;"></div>

    <div id="errorMsg" class="error" style="display: none;"></div>

    <div id="statusBar" class="status-bar">Ready</div>

    <script>
        (function() {
            const vscode = acquireVsCodeApi();
            let currentResponse = '';
            let recognition = null;
            let historyVisible = false;

            function escapeHtml(text) {
                if (!text) return '';
                return text.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function renderMarkdown(text) {
                if (!text) return '';
                let html = escapeHtml(text);
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/_(.*?)_/g, '<em>$1</em>');
                html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                    return '<pre><code class="language-' + lang + '">' + code.trim() + '</code></pre>';
                });
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
                html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
                html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
                html = html.replace(/^[-*] (.*?)$/gm, '<li>$1</li>');
                html = html.replace(/(<li>.*?<\/li>\n?)+/gs, '<ul>$&</ul>');
                html = html.replace(/\n/g, '<br>');
                html = html.replace(/^&gt; (.*?)$/gm, '<blockquote>$1</blockquote>');
                return html;
            }

            function updateStatus(text) {
                const statusEl = document.getElementById('statusBar');
                if (statusEl) statusEl.textContent = text;
            }

            function toggleHistory() {
                const msgs = document.getElementById('historyMessages');
                const header = document.getElementById('historyHeader');
                if (historyVisible) {
                    msgs.style.display = 'none';
                    header.innerHTML = '📜 History ▶';
                } else {
                    msgs.style.display = 'block';
                    header.innerHTML = '📜 History ▼';
                }
                historyVisible = !historyVisible;
            }

            function loadInitialHistory() {
                vscode.postMessage({ command: 'getInitialHistory' });
            }

            // FIXED: sendPrompt function added here
            function sendPrompt() {
                const prompt = document.getElementById('promptInput').value.trim();
                if (prompt) {
                    console.log('Sending prompt:', prompt);
                    updateStatus('Sending...');
                    vscode.postMessage({ command: 'sendPrompt', prompt: prompt });
                    document.getElementById('promptInput').value = '';
                } else {
                    updateStatus('Please enter a prompt');
                }
            }

            function initEventListeners() {
                document.getElementById('historyHeader').onclick = toggleHistory;

                document.getElementById('voiceBtn').onclick = function() {
                    if (recognition) recognition.start();
                    else updateStatus('Voice not supported');
                };

                document.getElementById('imageBtn').onclick = function() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = function(e) {
                        const file = e.target.files[0];
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            const prompt = document.getElementById('promptInput').value || 'Analyze this image';
                            vscode.postMessage({ command: 'sendImageInput', imageData: ev.target.result, prompt: prompt });
                        };
                        reader.readAsDataURL(file);
                    };
                    input.click();
                };

                document.getElementById('settingsBtn').onclick = function() {
                    vscode.postMessage({ command: 'sendPrompt', prompt: '/settings' });
                };

                document.getElementById('exportBtn').onclick = function() {
                    vscode.postMessage({ command: 'exportHistory' });
                };

                document.getElementById('importBtn').onclick = function() {
                    vscode.postMessage({ command: 'importHistory' });
                };

                document.getElementById('clearAllBtn').onclick = function() {
                    vscode.postMessage({ command: 'clearHistory' });
                };

                const promptInput = document.getElementById('promptInput');
                if (promptInput) {
                    promptInput.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            sendPrompt();  // Now this works because sendPrompt exists
                        }
                    });
                }

                document.getElementById('searchBtn').onclick = function() {
                    const query = document.getElementById('searchInput').value.trim();
                    if (query) {
                        vscode.postMessage({ command: 'searchWorkspace', query: query });
                    }
                };

                const applyBtn = document.getElementById('applyBtn');
                if (applyBtn) {
                    applyBtn.onclick = function() {
                        if (currentResponse && currentResponse.trim()) {
                            const codeMatch = currentResponse.match(/```[\w]*\n([\s\S]*?)```/);
                            if (codeMatch) {
                                vscode.postMessage({ command: 'applyCode', code: codeMatch[1] });
                            } else {
                                vscode.postMessage({ command: 'applyCode', code: currentResponse });
                            }
                            updateStatus('Applying...');
                        } else {
                            updateStatus('Nothing to apply');
                        }
                    };
                }

                const copyBtn = document.getElementById('copyBtn');
                if (copyBtn) {
                    copyBtn.onclick = function() {
                        if (currentResponse && currentResponse.trim()) {
                            vscode.postMessage({ command: 'copyCode', code: currentResponse });
                            updateStatus('Copied!');
                        }
                    };
                }
            }

            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.onresult = function(e) {
                    const text = e.results[0][0].transcript;
                    document.getElementById('promptInput').value = text;
                    sendPrompt();
                };
                recognition.onerror = function() {
                    updateStatus('Voice error');
                };
            }

            window.addEventListener('message', function(event) {
                const msg = event.data;
                
                switch (msg.command) {
                    case 'selectionLoaded':
                        document.getElementById('selectionInfo').style.display = 'block';
                        document.getElementById('fileInfo').innerHTML = '📄 ' + msg.fileName + ' L' + msg.lineStart + '-' + msg.lineEnd;
                        document.getElementById('selectedCode').textContent = msg.code;
                        break;
                    case 'updateHistory':
                        const historyDiv = document.getElementById('historyMessages');
                        if (msg.history && msg.history.length) {
                            let html = '';
                            for (let i = 0; i < msg.history.length; i++) {
                                const h = msg.history[i];
                                html += '<div class="history-message ' + h.role + '" data-index="' + i + '">' +
                                    '<div class="history-content">' +
                                    '<strong>' + (h.role === 'user' ? 'You' : 'AI') + ':</strong> ' +
                                    '<span>' + escapeHtml(h.content) + '</span>' +
                                    '</div>' +
                                    '<button class="delete-history-btn" data-index="' + i + '" title="Delete">🗑️</button>' +
                                    '</div>';
                            }
                            historyDiv.innerHTML = html;
                            
                            document.querySelectorAll('.delete-history-btn').forEach(function(btn) {
                                btn.onclick = function(e) {
                                    e.stopPropagation();
                                    const idx = parseInt(btn.getAttribute('data-index'));
                                    vscode.postMessage({ command: 'deleteHistoryEntry', index: idx });
                                };
                            });
                        } else {
                            historyDiv.innerHTML = '<div class="system-message">No history yet</div>';
                        }
                        if (!historyVisible) {
                            historyDiv.style.display = 'none';
                        }
                        break;
                    case 'appendSystemMessage':
                        const sysDiv = document.createElement('div');
                        sysDiv.className = 'system-message';
                        sysDiv.textContent = msg.message;
                        document.getElementById('systemMessages').appendChild(sysDiv);
                        setTimeout(() => sysDiv.remove(), 3000);
                        break;
                    case 'searchResults':
                        const resultsDiv = document.getElementById('searchResults');
                        if (msg.results && msg.results.length) {
                            let html = '<strong>🔍 ' + msg.count + ' matches</strong><ul>';
                            for (let i = 0; i < msg.results.length; i++) {
                                const r = msg.results[i];
                                html += '<li onclick="window.vscodeApiOpenFile(\'' + r.path + ':' + r.line + '\')">' +
                                    '📄 ' + r.name + ' L' + r.line +
                                    '<div style="font-size:10px;">' + escapeHtml(r.preview) + '</div>' +
                                    '</li>';
                            }
                            html += '</ul>';
                            resultsDiv.innerHTML = html;
                        } else {
                            resultsDiv.innerHTML = '<div class="system-message">No results</div>';
                        }
                        resultsDiv.style.display = 'block';
                        break;
                    case 'clearHistory':
                        document.getElementById('historyMessages').innerHTML = '<div class="system-message">Cleared</div>';
                        break;
                    case 'thinking':
                        const thinkingEl = document.getElementById('thinking');
                        if (thinkingEl) {
                            thinkingEl.style.display = msg.thinking ? 'flex' : 'none';
                        }
                        updateStatus(msg.thinking ? 'Thinking...' : 'Ready');
                        break;
                    case 'clearResponse':
                        currentResponse = '';
                        document.getElementById('responseContent').innerHTML = '';
                        document.getElementById('responseArea').style.display = 'flex';
                        break;
                    case 'streamChunk':
                        currentResponse = msg.full;
                        document.getElementById('responseContent').innerHTML = renderMarkdown(msg.full);
                        document.getElementById('responseContent').scrollTop = document.getElementById('responseContent').scrollHeight;
                        break;
                    case 'streamComplete':
                        updateStatus('Ready');
                        break;
                    case 'response':
                        currentResponse = msg.response;
                        document.getElementById('responseContent').innerHTML = renderMarkdown(msg.response);
                        document.getElementById('responseArea').style.display = 'flex';
                        updateStatus('Ready');
                        break;
                    case 'error':
                        updateStatus('Error');
                        const errDiv = document.getElementById('errorMsg');
                        errDiv.innerHTML = '❌ ' + escapeHtml(msg.error);
                        errDiv.style.display = 'block';
                        setTimeout(() => errDiv.style.display = 'none', 5000);
                        break;
                }
            });

            window.vscodeApiOpenFile = function(path) {
                vscode.postMessage({ command: 'openFile', path: path });
            };

            initEventListeners();
            loadInitialHistory();
            
            const historyMsgsEl = document.getElementById('historyMessages');
            if (historyMsgsEl) {
                historyMsgsEl.style.display = 'none';
            }
            
            updateStatus('Ready');
        })();
    </script>
</body>

</html>
